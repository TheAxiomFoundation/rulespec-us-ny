format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ny/regulation/18-nycrr/387/14/a/1
  summary: |-
    "A household's benefit level for the initial month of certification is based on the day of the month the household applies for benefits." Benefits are prorated from the day of application to the end of the initial month; certain public-institution pre-release applicants are prorated from the release day. "Initial month means" the first certified month following a noncertified period, with a more-than-30-days rule for migrant or seasonal farmworker households.
rules:
  - name: initial_month_of_certification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 18 NYCRR 387.14(a)(1), definition of initial month
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ny/regulation/18-nycrr/387/14/a/1
              excerpt: "Initial month means: (i) the first month for which the household is certified"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ny/regulation/18-nycrr/387/14/a/1
              excerpt: "migrant or seasonal farmworker household"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ny/regulation/18-nycrr/387/14/a/1
              excerpt: "following a period of more than 30 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_certified_for_participation_in_food_stamp_program
          and (
            household_was_not_certified_for_participation_during_prior_period
            or (
              household_is_migrant_or_seasonal_farmworker_household
              and household_applies_following_more_than_30_days_not_certified
            )
          )
  - name: initial_month_benefit_level
    kind: derived
    entity: Household
    dtype: Money
    unit: USD
    period: Month
    source: 18 NYCRR 387.14(a)(1), initial-month proration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ny/regulation/18-nycrr/387/14/a/1
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ny/regulation/18-nycrr/387/14/a/1
              excerpt: "prorated from the day of application to the end of the initial month"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ny/regulation/18-nycrr/387/14/a/1
              excerpt: "resident of a public institution who applies jointly for SSI and food stamps"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ny/regulation/18-nycrr/387/14/a/1
              excerpt: "prorated from the day of the applicant's release from the institution"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if public_institution_prerelease_joint_ssi_food_stamp_applicant:
            max(0, first_full_month_benefit_level * proration_factor_from_release_day_to_end_of_month)
          else:
            if initial_month_of_certification:
              max(0, first_full_month_benefit_level * proration_factor_from_application_day_to_end_of_initial_month)
            else:
              0
