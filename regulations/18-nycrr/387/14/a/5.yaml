            member_determined_eligible_for_family_assistance_or_nonemergency_safety_net_benefits
            and not member_paid_family_assistance_or_nonemergency_safety_net_benefits
            and member_family_assistance_or_nonemergency_safety_net_grant_amount < family_assistance_or_safety_net_minimum_payable_grant_amount
