              output: family_assistance_or_safety_net_minimum_payable_grant_amount
              hash: sha256:local
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          member_receives_family_assistance_nonemergency_safety_net_or_ssi_benefits
          or member_authorized_to_receive_family_assistance_nonemergency_safety_net_or_ssi_benefits_but_not_yet_paid
