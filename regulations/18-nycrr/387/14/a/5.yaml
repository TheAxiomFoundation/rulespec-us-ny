format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ny/regulation/18-nycrr/387/14/a/5
  summary: |-
    Categorically eligible households are exempted from gross and net income limits and presumed to meet resource limits. Clause (a) covers households in which all members are recipients of family assistance, nonemergency safety net assistance and/or SSI benefits, including authorized-but-unpaid, suspended or recouped, and under-$10 grant cases. Clauses (b)-(e) cover elderly or disabled member households at 200 percent FPL, dependent-care households at 200 percent FPL, earned-income households at 150 percent FPL, and residual households at 130 percent FPL, subject to disqualification and ineligible-individual exclusions.
imports:
  - us:statutes/7/2012/j
  - us:regulations/7-cfr/273/10#snap_total_gross_income
  - us:policies/usda/snap/fy-2026-cola/income-eligibility-standards#snap_net_income_limit_100_percent_fpl_48_states_dc
rules:
