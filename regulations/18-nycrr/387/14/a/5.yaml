format: rulespec/v1
module:
  summary: |-
    New York categorical eligibility exempts qualifying SNAP households from
    gross and net income limits and presumes they meet resource limits. The
    categorical groups include all-member public assistance, safety net, or SSI
    households, which restate federal regular categorical eligibility in New
    York program terms; households with an elderly or disabled member at or
    below 200 percent of the federal poverty limit; households with out-of-pocket
    dependent care expenses at or below 200 percent; households with budgeted
    earned income at or below 150 percent; and remaining households at or below
    130 percent, subject to the disqualification exclusions in the regulation.
  source_verification:
    corpus_citation_path: us-ny/regulation/18-nycrr/387/14/a/5
imports:
  - us:statutes/7/2012/j
  - us:regulations/7-cfr/273/2/j
  - us:regulations/7-cfr/273/9
  - us:regulations/7-cfr/273/10
  - us:policies/usda/snap/fy-2026-cola/income-eligibility-standards
rules:
  - name: ny_snap_public_assistance_categorically_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 18 NYCRR 387.14(a)(5)(i)(a)
    versions:
      - effective_from: '2025-10-01'
        formula: household_all_members_receive_family_assistance_nonemergency_safety_net_or_ssi
  - name: relates_all_member_pa_ssi_status_to_federal_regular_categorical_eligibility
    kind: source_relation
    source: 18 NYCRR 387.14(a)(5)(i)(a)
    source_relation:
      type: restates
      target: us:regulations/7-cfr/273/2/j#snap_regular_categorical_pa_or_ssi_status
      authority: state
  - name: ny_snap_categorical_eligibility_200_percent_fpl_ratio
    kind: parameter
    dtype: Rate
    source: 18 NYCRR 387.14(a)(5)(i)(b)-(c)
    versions:
      - effective_from: '2025-10-01'
        formula: '2.00'
  - name: ny_snap_categorical_eligibility_150_percent_fpl_ratio
    kind: parameter
    dtype: Rate
    source: 18 NYCRR 387.14(a)(5)(i)(d)
    versions:
      - effective_from: '2025-10-01'
        formula: '1.50'
  - name: ny_snap_categorical_gross_income_limit_200_percent_fpl
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 18 NYCRR 387.14(a)(5)(i)(b)-(c)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_net_income_limit_100_percent_fpl_48_states_dc * ny_snap_categorical_eligibility_200_percent_fpl_ratio
  - name: ny_snap_categorical_gross_income_limit_150_percent_fpl
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 18 NYCRR 387.14(a)(5)(i)(d)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_net_income_limit_100_percent_fpl_48_states_dc * ny_snap_categorical_eligibility_150_percent_fpl_ratio
  - name: ny_snap_member_elderly_or_disabled
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 18 NYCRR 387.14(a)(5)(i)(b)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_member_is_elderly_or_disabled
  - name: ny_snap_elderly_disabled_categorically_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 18 NYCRR 387.14(a)(5)(i)(b)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          count_where(member_of_household, ny_snap_member_elderly_or_disabled) > 0
          and snap_gross_monthly_income <= ny_snap_categorical_gross_income_limit_200_percent_fpl
  - name: ny_snap_dependent_care_categorically_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 18 NYCRR 387.14(a)(5)(i)(c)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_has_out_of_pocket_dependent_care_expenses
          and snap_gross_monthly_income <= ny_snap_categorical_gross_income_limit_200_percent_fpl
  - name: ny_snap_earned_income_categorically_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 18 NYCRR 387.14(a)(5)(i)(d)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_has_earned_income_budgeted_for_snap
          and snap_gross_monthly_income <= ny_snap_categorical_gross_income_limit_150_percent_fpl
  - name: ny_snap_standard_gross_income_categorically_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 18 NYCRR 387.14(a)(5)(i)(e)
    versions:
      - effective_from: '2025-10-01'
        formula: snap_gross_monthly_income <= snap_gross_income_limit_130_percent_fpl_48_states_dc
  - name: ny_snap_categorical_disqualification_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 18 NYCRR 387.14(a)(5)(ii)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_member_disqualified_for_intentional_program_violation
          or household_member_failed_periodic_reporting_requirement
          or household_member_failed_snap_work_requirements
  - name: ny_snap_categorically_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 18 NYCRR 387.14(a)(5)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
              ny_snap_public_assistance_categorically_eligible
              or ny_snap_elderly_disabled_categorically_eligible
              or ny_snap_dependent_care_categorically_eligible
              or ny_snap_earned_income_categorically_eligible
              or ny_snap_standard_gross_income_categorically_eligible
          )
          and not ny_snap_categorical_disqualification_applies
  - name: snap_categorically_eligible_for_resource_exemption
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 18 NYCRR 387.14(a)(5)(i)
    versions:
      - effective_from: '2025-10-01'
        formula: ny_snap_categorically_eligible
  - name: snap_income_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 18 NYCRR 387.14(a)(5)(i)
    versions:
      - effective_from: '2025-10-01'
        formula: ny_snap_categorically_eligible or snap_standard_income_eligible
