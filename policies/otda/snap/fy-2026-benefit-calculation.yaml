format: rulespec/v1
module:
  proof_validation:
    required: true
  kind: composition
  summary: |-
    New York SNAP FY 2026 benefit calculation composition. This module imports
    the federal USDA FY 2026 SNAP maximum allotment, standard deduction, excess
    shelter, resource-limit, income-standard, income-calculation, residency,
    citizenship, SSN, student, work-requirement, and allotment rules, then adds
    New York's FY 2026 standard utility allowances and initial-month
    proration rule. It composes those sources into New York SNAP eligibility
    and allotment calculations.
  source_verification:
    corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
imports:
  - us:policies/usda/snap/fy-2026-cola/maximum-allotments
  - us:policies/usda/snap/fy-2026-cola/deductions
  - us:policies/usda/snap/fy-2026-cola/income-eligibility-standards
  - us:regulations/7-cfr/273/3
  - us:regulations/7-cfr/273/4
  - us:regulations/7-cfr/273/5
  - us:regulations/7-cfr/273/6
  - us:regulations/7-cfr/273/7
  - us:regulations/7-cfr/273/8
  - us:regulations/7-cfr/273/9
  - us:regulations/7-cfr/273/10
  - us:regulations/7-cfr/273/24
  - us:statutes/7/2012/j
  - us:statutes/7/2014/e/2
  - us:statutes/7/2014/e/6/A
  - us:statutes/7/2017/a
  - us-ny:regulations/18-nycrr/387/10
  - us-ny:regulations/18-nycrr/387/14/a/1
  - us-ny:regulations/18-nycrr/387/14/a/5
  - us-ny:regulations/18-nycrr/387/12/a
  - us-ny:regulations/18-nycrr/387/12/b
  - us-ny:regulations/18-nycrr/387/12/f/3/vi
  - us-ny:regulations/18-nycrr/387/9/a/1
  - us-ny:regulations/18-nycrr/387/9/a/2
  - us-ny:regulations/18-nycrr/385/3
  - us-ny:regulations/18-nycrr/387/12/f/3/v/a
  - us-ny:regulations/18-nycrr/387/12/f/3/v/b
  - us-ny:regulations/18-nycrr/387/12/f/3/v/c
rules:
  - name: member_of_household
    kind: data_relation
    data_relation:
      predicate: member_of_household
      arity: 2
      arguments:
        - Person
        - Household

  - name: shelter_costs
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_shelter_costs_incurred
          + snap_standard_utility_allowance
          + snap_limited_utility_allowance
          + snap_individual_utility_allowance
  - name: snap_gross_monthly_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          max(
              0,
              snap_countable_earned_income
              + snap_countable_unearned_income
          )
  - name: snap_monthly_household_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          max(
              0,
              snap_countable_earned_income
              + snap_countable_unearned_income
          )
  - name: ny_snap_excess_shelter_cost
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          max(
              0,
              snap_allowable_shelter_costs
              - (snap_net_income_pre_shelter * snap_excess_shelter_income_share)
          )
  - name: snap_excess_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_full_excess_shelter_deduction_applies:
              ny_snap_excess_shelter_cost
          else:
              min(ny_snap_excess_shelter_cost, snap_maximum_excess_shelter_deduction_48_states_dc)
  - name: snap_initial_month_allotment_after_minimum_issuance
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_initial_month_prorated_allotment < snap_initial_month_minimum_issuance:
              0
          else:
              snap_initial_month_prorated_allotment
  - name: snap_ssn_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: count_where(member_of_household, snap_member_ssn_requirement_ineligible) == 0
  - name: snap_residency_citizenship_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_household_residency_eligible
          and count_where(member_of_household, snap_member_citizenship_or_alien_status_eligible) > 0
  - name: snap_work_requirement_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          count_where(member_of_household, snap_member_work_requirement_ineligible) == 0
  - name: snap_student_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: count_where(member_of_household, snap_member_student_ineligible) == 0
  - name: snap_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: New York SNAP FY 2026 benefit calculation composition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
              span: 'New York SNAP FY 2026 benefit calculation composition'
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          (
            snap_income_limit_exemption_for_categorically_eligible_household
            or snap_standard_income_eligible
          )
          and (snap_resource_eligible or ny_snap_categorically_eligible)
          and snap_ssn_eligible
          and snap_work_requirement_eligible
          and snap_student_eligible
          and snap_residency_citizenship_eligible
